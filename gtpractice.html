        };

        // YouTube ID 파싱 유틸리티
        function parseYouTubeId(url) {
            try {
                const u = new URL(url.trim());
                if (u.hostname === 'youtu.be') return u.pathname.slice(1) || null;
                if (/youtube\.com$|youtube-nocookie\.com$/.test(u.hostname)) {
                    const v = u.searchParams.get('v');
                    if (v) return v;
                    const parts = u.pathname.split('/').filter(Boolean);
                    const idx = parts.indexOf('embed');
                    if (idx !== -1 && parts[idx+1]) return parts[idx+1];
                }
            } catch (e) {
                if (/^[a-zA-Z0-9_-]{11}$/.test(url.trim())) return url.trim();
            }
            return null;
        }

        // YouTube 플레이어 생성/교체
        function loadYouTubeVideo(videoId, loopOpts) {
            const container = document.getElementById('ytPlayerContainer');
            const speedRow  = document.getElementById('ytSpeedRow');
            const loopRow   = document.getElementById('ytLoopRow');
            const addFavBtn = document.getElementById('ytAddFavorite');

            if (!videoId) {
                alert('올바른 YouTube URL 또는 영상 ID를 입력하세요.');
                return;
            }

            // 즐겨찾기에서 루프 포인트 복원 (loopActive는 false로 시작)
            if (loopOpts && typeof loopOpts === 'object') {
                loopA = (typeof loopOpts.loopA === 'number') ? loopOpts.loopA : null;
                loopB = (typeof loopOpts.loopB === 'number') ? loopOpts.loopB : null;
                loopActive = false;
                stopLoopInterval();
            }

            container.style.display = '';
            speedRow.style.cssText  = 'display:flex!important;align-items:center;gap:12px;margin-bottom:12px;';
            loopRow.style.cssText   = 'display:flex!important;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;';
            addFavBtn.style.display = '';
            updateLoopUI();

            if (player && typeof player.loadVideoById === 'function') {
                player.loadVideoById(videoId);
                return;
            }

            // 플레이어 div 초기화
            const playerDiv = document.getElementById('ytPlayer');
            playerDiv.innerHTML = '';

            const initPlayer = () => {
                player = new YT.Player('ytPlayer', {
                    videoId: videoId,
                    playerVars: { rel: 0, modestbranding: 1 },
                    events: {
                        onStateChange: function(event) {
                            // 재생 시작 시 메트로놈 정지 (상호 배제)
                            if (event.data === YT.PlayerState.PLAYING) {
                                if (isPlaying) stopMetronome();
                                // 루프 활성 상태이고 A/B가 설정돼 있으면 폴링 시작
                                if (loopActive && loopA !== null && loopB !== null) {
                                    startLoopInterval();
                                }
                            } else {
                                // 재생 상태가 아니면 폴링 중지
                                stopLoopInterval();
                            }
                        }
                    }
                });
            };

            if (ytApiLoaded && typeof YT !== 'undefined' && YT.Player) {
                initPlayer();
            } else {
                ensureYtApi();
                // API 로드 완료를 폴링
                const iv = setInterval(() => {
                    if (typeof YT !== 'undefined' && YT.Player) {
                        clearInterval(iv);
                        ytApiLoaded = true;
                        initPlayer();
                    }
                }, 150);
            }
        }

        // ===== 즐겨찾기 =====

                    if (newLabel && newLabel.trim()) {
                        const f = loadFavorites();
                        if (f[i]) { f[i].label = newLabel.trim(); saveFavorites(f); renderFavorites(); }
                    }
                });

                const removeBtn = document.createElement('span');
                removeBtn.className = 'chip-remove';
                removeBtn.textContent = '×';
                removeBtn.title = '삭제';
                removeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const f = loadFavorites();
                    f.splice(i, 1);
                    saveFavorites(f);
                    renderFavorites();
                });

                chip.appendChild(label);
                chip.appendChild(editBtn);
                chip.appendChild(removeBtn);
                listEl.appendChild(chip);
            });
        }

        function addFavorite() {
            if (!player || typeof player.getVideoData !== 'function') return;
            const data  = player.getVideoData();
            const videoId = data.video_id || '';
            if (!videoId) return;
            const title  = (data.title && data.title.trim()) || document.getElementById('ytUrlInput').value || videoId;
            const url    = document.getElementById('ytUrlInput').value.trim() || 'https://www.youtube.com/watch?v=' + videoId;
            const favs   = loadFavorites();
            // 중복 방지
            if (favs.some(f => f.videoId === videoId)) {
                alert('이미 즐겨찾기에 있습니다.');
                return;
            }
            const newFav = { label: title, videoId, url };
            if (loopA !== null) newFav.loopA = loopA;
            if (loopB !== null) newFav.loopB = loopB;
            favs.push(newFav);
            saveFavorites(favs);
            renderFavorites();
        }

        // ===== localStorage 지속화 =====
        const STORAGE_KEY = 'scaleflow.settings.v1';
        function saveSettings() {
            try {
                const activeTabEl = document.querySelector('.tab-btn.active');
                const data = {
                    bpm: document.getElementById('bpm').value,
                    timeSignature: document.getElementById('timeSignature').value,
                    metronomeSound: document.getElementById('metronomeSound').value,
                    subdivision: currentSubdivision,
                    instrument: document.getElementById('instrumentSelect').value,
                    keyCenter: document.getElementById('keyCenter').value,
                    scaleType: document.getElementById('scaleType').value,
                    chordMode: document.getElementById('chordMode').checked,
                    darkMode: document.getElementById('darkMode').checked,
                    countIn: countInEnabled,
                    activeTab: activeTabEl ? (activeTabEl.id === 'tabBackingTrack' ? 'backingtrack' : 'metronome') : 'metronome',
                    volumes: {
                        metronome: document.getElementById('metronomeVolume').value,
                        bass: document.getElementById('bassVolume').value,
                        piano: document.getElementById('pianoVolume').value,
                        drumMaster: document.getElementById('drumMasterVolume').value,
                        instrument: document.getElementById('instrumentVolume').value,
                        kick: document.getElementById('kickVolume').value,
                        snare: document.getElementById('snareVolume').value,
                        hihat: document.getElementById('hihatVolume').value,
                        crash: document.getElementById('crashVolume').value
                    },
                    progression: chordProgression.map(c => getChordName(c) + ':' + (c.duration || 4))
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            } catch (e) { /* ignore quota/serialize errors */ }
        }

        function loadSettings() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return null;
                return JSON.parse(raw);
            } catch (e) { return null; }
        }

        function applySettings(s) {
            if (!s) return;
            const setVal = (id, v) => { const el = document.getElementById(id); if (el != null && v != null) el.value = v; };
            setVal('bpm', s.bpm);
            setVal('timeSignature', s.timeSignature);
            setVal('metronomeSound', s.metronomeSound);
            setVal('instrumentSelect', s.instrument);
            setVal('keyCenter', s.keyCenter);
            if (s.keyCenter) lastScaleKey = s.keyCenter;
            setVal('scaleType', s.scaleType);
            if (s.subdivision) {
                currentSubdivision = s.subdivision;
                document.querySelectorAll('.subdivision-btn').forEach(b => {
                    b.classList.toggle('active', b.dataset.value === s.subdivision);
                });
            }
            if (typeof s.chordMode === 'boolean') {
                document.getElementById('chordMode').checked = s.chordMode;
                document.getElementById('chordProgressionPanel').style.display = s.chordMode ? 'block' : 'none';
            }
            if (typeof s.darkMode === 'boolean') {
                document.getElementById('darkMode').checked = s.darkMode;
                toggleTheme();
            }
            if (typeof s.countIn === 'boolean') {
                countInEnabled = s.countIn;
                const btn = document.getElementById('countInToggle');
                if (btn) btn.classList.toggle('on', countInEnabled);
            }
            if (s.volumes) {
                const v = s.volumes;
                const setSlider = (id, val) => {
                    const el = document.getElementById(id);
                    if (el != null && val != null) {
                        el.value = val;
                        const disp = document.getElementById(id + 'Display');
                        if (disp) disp.textContent = val;
                    }
                };
                setSlider('metronomeVolume', v.metronome);
                setSlider('bassVolume', v.bass);
                setSlider('pianoVolume', v.piano);
                setSlider('drumMasterVolume', v.drumMaster);
                setSlider('instrumentVolume', v.instrument);
                setSlider('kickVolume', v.kick);
                setSlider('snareVolume', v.snare);
                setSlider('hihatVolume', v.hihat);
                setSlider('crashVolume', v.crash);
            }
            if (s.activeTab && s.activeTab !== 'metronome') {
                switchMainTab(s.activeTab);
            }
            if (Array.isArray(s.progression) && s.progression.length) {
                const parsed = s.progression.map(item => {
                    const [name, dur] = String(item).split(':');
                    const c = parseChord(name);
                    if (c && dur) c.duration = parseInt(dur) || 4;
                    return c;
                }).filter(Boolean);
                if (parsed.length) {
                    chordProgression = parsed;
                    currentChordIndex = 0;
                    currentChordBeat = 0;
                }
            }
        }

        // ===== URL 해시 공유 =====
        function progressionToHash() {
            const list = chordProgression.map(c => getChordName(c) + ':' + (c.duration || 4));
            return '#p=' + encodeURIComponent(list.join(','));
        }

        function loadProgressionFromHash() {
            const m = location.hash.match(/[#&]p=([^&]+)/);
            if (!m) return false;
            try {
                const list = decodeURIComponent(m[1]).split(',');
                const parsed = list.map(item => {
                    const [name, dur] = item.split(':');
                    const c = parseChord(name);
                    if (c && dur) c.duration = parseInt(dur) || 4;
                    return c;
                }).filter(Boolean);
                if (parsed.length) {
                    chordProgression = parsed;
                    currentChordIndex = 0;
                    currentChordBeat = 0;
                    lastScaleKey = document.getElementById('keyCenter').value;
                    return true;
                }
            } catch (e) { /* ignore */ }
            return false;
        }

        function shareProgression() {
            const url = location.origin + location.pathname + progressionToHash();
            const btn = document.getElementById('shareProgression');
            const done = (ok) => {
                if (!btn) return;
                const original = btn.textContent;
                btn.textContent = ok ? '복사됨' : '복사 실패';
                btn.classList.add('on');
                setTimeout(() => {
                    btn.textContent = original;
                    btn.classList.remove('on');
                }, 1200);
            };
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(url).then(() => done(true)).catch(() => {
                    history.replaceState(null, '', progressionToHash());
                    done(false);
                });
            } else {
                history.replaceState(null, '', progressionToHash());
                done(false);
            }
        }

        // ===== 코드 수동 이동 (키보드) =====
        function stepChord(delta) {
            if (!chordProgression.length) return;
            const chordMode = document.getElementById('chordMode').checked;
            if (!chordMode) return;
            currentChordIndex = (currentChordIndex + delta + chordProgression.length) % chordProgression.length;
            currentChordBeat = 0;
            const cd = document.getElementById('currentChordDisplay');
            if (cd) cd.textContent = getChordName(chordProgression[currentChordIndex]);
            document.querySelectorAll('.chord-item').forEach((item, i) => {
                item.classList.toggle('playing', i === currentChordIndex);
            });
            updateChordTimelineProgress();
        }

        // 이벤트 리스너 설정
        document.addEventListener('DOMContentLoaded', function() {
            // 초기 설정 — 저장된 설정 복원 후 UI 생성 (해시가 있으면 해시 우선)
            const saved = loadSettings();
            applySettings(saved);
            loadProgressionFromHash();

            updateBeatIndicators();
            createDrumGrid();
            createFretboard();
            updateChordProgressionUI();
            renderChordTimeline();
            updateTimerDisplay();

            if (saved && saved.instrument && saved.instrument !== 'guitar') {
                switchInstrument();
            }
            
            // 악기 변경
            document.getElementById('instrumentSelect').addEventListener('change', switchInstrument);
            
            // 스케일 변경
            document.getElementById('keyCenter').addEventListener('change', function() {
                const newKey = this.value;
                const delta = ((getNoteIndex(newKey) - getNoteIndex(lastScaleKey)) + 12) % 12;
                if (delta !== 0) {
                    chordProgression.forEach(chord => {
                        chord.root = notes[(getNoteIndex(chord.root) + delta + 12) % 12];
                    });
                    updateChordProgressionUI();
                    updateCurrentChordDisplay();
                }
                lastScaleKey = newKey;
                updateScale();
            });
            document.getElementById('scaleType').addEventListener('change', updateScale);
            
            // 프렛보드 모드 변경
            document.getElementById('fretboardMode').addEventListener('change', updateScale);
            document.getElementById('violinMode').addEventListener('change', updateScale);
            
            // 박자표 변경
            document.getElementById('timeSignature').addEventListener('change', updateBeatIndicators);
            
            // 메트로놈 컨트롤
            document.getElementById('metronomePlay').addEventListener('click', startMetronome);
            document.getElementById('metronomeStop').addEventListener('click', stopMetronome);
            
            // 타이머 컨트롤
            document.getElementById('timerType').addEventListener('change', function() {
                const timerType = this.value;
                const timeDiv = document.getElementById('timeTimerDiv');
                const barsDiv = document.getElementById('barsTimerDiv');
                
                if (timerType === 'time') {
                    timeDiv.style.display = 'block';
                    barsDiv.style.display = 'none';
                } else {
                    timeDiv.style.display = 'none';
                    barsDiv.style.display = 'block';
                }
                updateTimerDisplay();
            });
            
            document.getElementById('timeTimer').addEventListener('change', updateTimerDisplay);
            document.getElementById('barsTimer').addEventListener('change', updateTimerDisplay);
            document.getElementById('timerStart').addEventListener('click', startTimer);
            
            // 다크모드 토글
            document.getElementById('darkMode').addEventListener('change', toggleTheme);
            
            // 코드 모드 토글
            document.getElementById('chordMode').addEventListener('change', function() {
                const chordPanel = document.getElementById('chordProgressionPanel');
                chordPanel.style.display = this.checked ? 'block' : 'none';
            });
            
            // 코드 추가 버튼
            document.getElementById('addChord').addEventListener('click', () => addChord());

            // 자유 입력 파싱으로 코드 추가
            const chordInputEl = document.getElementById('chordInput');
            const chordInputAddHandler = () => {
                const val = chordInputEl.value;
                if (addChord(val)) {
                    chordInputEl.value = '';
                    chordInputEl.classList.remove('border-red-500');
                } else {
                    chordInputEl.classList.add('border-red-500');
                }
            };
            document.getElementById('chordInputAdd').addEventListener('click', chordInputAddHandler);
            chordInputEl.addEventListener('keydown', e => {
                if (e.key === 'Enter') { e.preventDefault(); chordInputAddHandler(); }
            });

            // 코드 진행 초기화
            document.getElementById('clearChords').addEventListener('click', () => {
                chordProgression = [
                    { root: 'C', quality: 'major', seventh: '', tensions: [], extras: [], duration: 4 }
                ];
                currentChordIndex = 0;
                currentChordBeat = 0;
                lastScaleKey = document.getElementById('keyCenter').value;
                updateChordProgressionUI();
            });

            // 프리셋 드롭다운 채우기
            const presetSel = document.getElementById('chordPresetSelect');
            Object.entries(chordPresets).forEach(([key, preset]) => {
                const opt = document.createElement('option');
                opt.value = key;
                opt.textContent = preset.label;
                presetSel.appendChild(opt);
            });
            presetSel.addEventListener('change', function() {
                if (this.value) {
                    loadChordPreset(this.value);
                    this.value = '';
                }
            });
            
            // 재생 옵션 버튼들
            document.querySelectorAll('.subdivision-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.subdivision-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentSubdivision = this.dataset.value;
                });
            });
            
            // 리듬 패널 토글
            document.getElementById('rhythmToggle').addEventListener('click', function() {
                const panel = document.getElementById('rhythmPanel');
                panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            });
            
            // 음량 패널 토글
            document.getElementById('volumeToggle').addEventListener('click', function() {
                const panel = document.getElementById('volumePanel');
                panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            });
            
            // 음량 슬라이더 이벤트
            const volumeSliders = [
                'metronomeVolume', 'bassVolume', 'pianoVolume', 'drumMasterVolume', 'instrumentVolume',
                'kickVolume', 'snareVolume', 'hihatVolume', 'crashVolume'
            ];
            
            volumeSliders.forEach(sliderId => {
                const slider = document.getElementById(sliderId);
                const display = document.getElementById(sliderId + 'Display');
                
                slider.addEventListener('input', function() {
                    display.textContent = this.value;
                });
            });
            
            // 패널 외부 클릭 시 닫기
            document.addEventListener('click', function(e) {
                const rhythmPanel = document.getElementById('rhythmPanel');
                const rhythmToggle = document.getElementById('rhythmToggle');
                const volumePanel = document.getElementById('volumePanel');
                const volumeToggle = document.getElementById('volumeToggle');

                if (!rhythmPanel.contains(e.target) && !rhythmToggle.contains(e.target)) {
                    rhythmPanel.style.display = 'none';
                }

                if (!volumePanel.contains(e.target) && !volumeToggle.contains(e.target)) {
                    volumePanel.style.display = 'none';
                }
            });

            // 탭 템포
            document.getElementById('tapTempo').addEventListener('click', handleTapTempo);

            // 카운트인 토글
            const countInBtn = document.getElementById('countInToggle');
            countInBtn.classList.toggle('on', countInEnabled);
            countInBtn.addEventListener('click', () => {
                countInEnabled = !countInEnabled;
                countInBtn.classList.toggle('on', countInEnabled);
                saveSettings();
            });

            // 진행 공유
            document.getElementById('shareProgression').addEventListener('click', shareProgression);

            // 키보드 단축키 — 입력 포커스 중엔 무시
            document.addEventListener('keydown', function(e) {
                const tag = (e.target && e.target.tagName) || '';
                if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
                if (e.ctrlKey || e.metaKey || e.altKey) return;
                if (e.code === 'Space') {
                    e.preventDefault();
                    if (isPlaying) stopMetronome(); else startMetronome();
                } else if (e.key === 't' || e.key === 'T') {
                    e.preventDefault();
                    handleTapTempo();
                } else if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    stepChord(1);
                } else if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    stepChord(-1);
                }
            });

            // 매 60ms 타임라인 진행바 업데이트 (재생 중일 때만 의미)
            setInterval(() => {
                if (isPlaying) updateChordTimelineProgress();
            }, 60);

            // 주요 설정 변경 시 저장
            const persistIds = [
                'bpm', 'timeSignature', 'metronomeSound', 'instrumentSelect',
                'keyCenter', 'scaleType', 'chordMode', 'darkMode',
                'metronomeVolume', 'bassVolume', 'pianoVolume', 'drumMasterVolume',
                'instrumentVolume', 'kickVolume', 'snareVolume', 'hihatVolume', 'crashVolume'
            ];
            persistIds.forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                el.addEventListener('change', saveSettings);
                if (el.type === 'range') el.addEventListener('input', saveSettings);
            });
            document.querySelectorAll('.subdivision-btn').forEach(btn => {
                btn.addEventListener('click', saveSettings);
            });

            // 해시 변경 수신 (사용자가 링크 붙여넣었을 때)
            window.addEventListener('hashchange', () => {
                if (loadProgressionFromHash()) {
                    updateChordProgressionUI();
                }
            });

            // ===== 백킹트랙 이벤트 =====
            document.getElementById('ytLoadBtn').addEventListener('click', function() {
                const url = document.getElementById('ytUrlInput').value.trim();
                const videoId = parseYouTubeId(url);
                loadYouTubeVideo(videoId);
            });
            document.getElementById('ytUrlInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    const videoId = parseYouTubeId(this.value.trim());
                    loadYouTubeVideo(videoId);
                }
            });

            // 속도 슬라이더
            const ytSpeedSlider = document.getElementById('ytSpeedSlider');
            const ytSpeedLabel  = document.getElementById('ytSpeedLabel');
            const defaultRates  = [0.5, 0.75, 1, 1.25, 1.5, 1.75, 2];
            ytSpeedSlider.addEventListener('input', function() {
                const idx = parseInt(this.value, 10);
                let rates = defaultRates;
                try {
                    if (player && typeof player.getAvailablePlaybackRates === 'function') {
                        const r = player.getAvailablePlaybackRates();
                        if (Array.isArray(r) && r.length) rates = r;
                    }
                } catch(e) {}
                const rate = rates[Math.min(idx, rates.length - 1)] || 1;
                ytSpeedLabel.textContent = rate + 'x';
                try {
                    if (player && typeof player.setPlaybackRate === 'function') {
                        player.setPlaybackRate(rate);
                    }
                } catch(e) {}
            });

            // 즐겨찾기 추가 버튼
            document.getElementById('ytAddFavorite').addEventListener('click', addFavorite);

            // 즐겨찾기 초기 렌더링
            renderFavorites();

            // ===== A-B 구간반복 이벤트 =====
            document.getElementById('ytSetA').addEventListener('click', function() {
                if (!player || typeof player.getCurrentTime !== 'function') {
                    flashBtnError(this, '영상 없음');
                    return;
                }
                try {
                    loopA = player.getCurrentTime();
                    // B가 이미 설정돼 있고 B <= A이면 B를 리셋
                    if (loopB !== null && loopB <= loopA) {
                        loopB = null;
                        loopActive = false;
                        stopLoopInterval();
                    }
                    updateLoopUI();
                } catch(e) {
                    flashBtnError(this, '오류');
                }
            });

            document.getElementById('ytSetB').addEventListener('click', function() {
                if (!player || typeof player.getCurrentTime !== 'function') {
                    flashBtnError(this, '영상 없음');
                    return;
                }
                try {
                    const t = player.getCurrentTime();
                    if (loopA !== null && t <= loopA) {
                        flashBtnError(this, 'B > A 필요');
                        return;
                    }
                    loopB = t;
                    updateLoopUI();
                } catch(e) {
                    flashBtnError(this, '오류');
                }
            });

            document.getElementById('ytLoopToggle').addEventListener('click', function() {
                if (loopA === null || loopB === null) return;
                loopActive = !loopActive;
                if (loopActive) {
                    // 플레이어가 재생 중일 때만 인터벌 시작
                    try {
                        if (player && player.getPlayerState() === YT.PlayerState.PLAYING) {
                            startLoopInterval();
                        }
                    } catch(e) {}
                } else {
                    stopLoopInterval();
                }
                updateLoopUI();
            });

            document.getElementById('ytLoopClear').addEventListener('click', function() {
                loopA = null;
                loopB = null;
                loopActive = false;
                stopLoopInterval();
                updateLoopUI();
            });
        });
    </script>
