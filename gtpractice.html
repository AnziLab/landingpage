                    ${chordObj.tensions.map(t => `<span class="inline-block bg-blue-100 text-blue-800 px-1 py-0 rounded text-xs cursor-pointer" onclick="removeTension(${index}, '${t}')">${t}×</span>`).join(' ')}
                </div>
                <div class="chord-duration-display text-xs">${chordObj.duration}박</div>
            `;
            return chordDiv;
        }
        
        // 코드 진행 UI 업데이트
        function updateChordProgressionUI() {
            const container = document.getElementById('chordContainer');
            container.innerHTML = '';
            
            chordProgression.forEach((chord, index) => {
                container.appendChild(createChordElement(chord, index));
            });
        }
        
        // 코드 업데이트
        function updateChord(index) {
            const chordDiv = document.querySelectorAll('.chord-item')[index];
            const root = chordDiv.querySelector('.chord-root').value;
            const quality = chordDiv.querySelector('.chord-quality').value;
            const seventh = chordDiv.querySelector('.chord-seventh').value;
            
            chordProgression[index] = {
                ...chordProgression[index],
                root,
                quality,
                seventh
            };
            
            updateChordProgressionUI();
        }
        
        // 텐션 추가
        function addTension(index, tension) {
            if (tension && !chordProgression[index].tensions.includes(tension)) {
                chordProgression[index].tensions.push(tension);
                updateChordProgressionUI();
            }
        }
        
        // 텐션 제거
        function removeTension(index, tension) {
            chordProgression[index].tensions = chordProgression[index].tensions.filter(t => t !== tension);
            updateChordProgressionUI();
        }
        
        // 코드 지속시간 조정
        function adjustChordDuration(index, delta) {
            const newDuration = Math.max(1, chordProgression[index].duration + delta);
            chordProgression[index].duration = newDuration;
            updateChordProgressionUI();
        }
        
        // 코드 추가 (선택적으로 문자열 파싱으로 추가)
        function addChord(inputStr) {
            let chord;
            if (typeof inputStr === 'string' && inputStr.trim()) {
                chord = parseChord(inputStr);
                if (!chord) return false;
            } else {
                chord = { root: 'C', quality: 'major', seventh: '', tensions: [], extras: [], duration: 4 };
            }
            chordProgression.push(chord);
            updateChordProgressionUI();
            return true;
        }

        // 코드 진행 프리셋 (문자열 배열로 정의 → parseChord로 객체화)
        const chordPresets = {

            'giant_steps':   { label: 'Giant Steps (일부)',      chords: ['Bmaj7','D7','Gmaj7','Bb7','Ebmaj7','Am7','D7','Gmaj7'] },

        // 프리셋 로드
        function loadChordPreset(key) {
            const preset = chordPresets[key];
            if (!preset) return;
            const parsed = preset.chords.map(s => parseChord(s)).filter(Boolean);
            if (parsed.length === 0) return;
            chordProgression = parsed;
            currentChordIndex = 0;
            currentChordBeat = 0;
            updateChordProgressionUI();
        }
        
        // 코드 삭제
        function deleteChord(index) {
            if (chordProgression.length > 1) {
                chordProgression.splice(index, 1);
                updateChordProgressionUI();
            }
        }

        function stopChordProgression() {
            currentChordIndex = 0;
            currentChordBeat = 0;

            const currentChordDisplay = document.getElementById('currentChordDisplay');
            if (currentChordDisplay) {
                currentChordDisplay.textContent = '-';
            }

            document.querySelectorAll('.chord-item').forEach(item => {

            });
        }

        }

                updateChordProgressionUI();
            });

            // 프리셋 드롭다운 채우기
            const presetSel = document.getElementById('chordPresetSelect');
            Object.entries(chordPresets).forEach(([key, preset]) => {
                const opt = document.createElement('option');
                opt.value = key;
                opt.textContent = preset.label;
                presetSel.appendChild(opt);
            });
            presetSel.addEventListener('change', function() {
                if (this.value) {
                    loadChordPreset(this.value);
                    this.value = '';
                }
            });
            
            // 재생 옵션 버튼들
            document.querySelectorAll('.subdivision-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.subdivision-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentSubdivision = this.dataset.value;
                });
            });
            
            // 리듬 패널 토글
            document.getElementById('rhythmToggle').addEventListener('click', function() {
                const panel = document.getElementById('rhythmPanel');
                panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            });
            
            // 음량 패널 토글
            document.getElementById('volumeToggle').addEventListener('click', function() {
                const panel = document.getElementById('volumePanel');
                panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            });
            
            // 음량 슬라이더 이벤트
            const volumeSliders = [
                'metronomeVolume', 'bassVolume', 'pianoVolume', 'drumMasterVolume', 'instrumentVolume',
                'kickVolume', 'snareVolume', 'hihatVolume', 'crashVolume'
            ];
            
            volumeSliders.forEach(sliderId => {
                const slider = document.getElementById(sliderId);
                const display = document.getElementById(sliderId + 'Display');
                
                slider.addEventListener('input', function() {
                    display.textContent = this.value;
                });
            });
            
            // 패널 외부 클릭 시 닫기
            document.addEventListener('click', function(e) {
                const rhythmPanel = document.getElementById('rhythmPanel');
                const rhythmToggle = document.getElementById('rhythmToggle');
                const volumePanel = document.getElementById('volumePanel');
                const volumeToggle = document.getElementById('volumeToggle');
                
                if (!rhythmPanel.contains(e.target) && !rhythmToggle.contains(e.target)) {
                    rhythmPanel.style.display = 'none';
                }
                
                if (!volumePanel.contains(e.target) && !volumeToggle.contains(e.target)) {
                    volumePanel.style.display = 'none';
                }
            });
        });
    </script>
