<!doctype html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Guitar Master</title>
  <style>
    :root {
      --radius: 14px;
      --gap: 16px;
      --pad: 14px;
    }
    [data-theme="dark"] {
      --bg: #0b1220; --surface: #1f2937; --surface-2: #111827;
      --text: #e5e7eb; --text-dim: #9ca3af;
      --accent: #6366f1; --accent-soft: rgba(99,102,241,0.2);
      --border: rgba(255,255,255,0.08); --danger: #ef4444;
      --success: #10b981;
    }
    [data-theme="light"] {
      --bg: #ffffff; --surface: #f8f9fa; --surface-2: #f1f3f5;
      --text: #111827; --text-dim: #6b7280;
      --accent: #4f46e5; --accent-soft: rgba(79,70,229,0.12);
      --border: rgba(0,0,0,0.08); --danger: #dc2626;
      --success: #059669;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "Noto Sans KR", sans-serif;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--pad);
      margin-bottom: var(--gap);
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 10px;
    }
    .card-title-row {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .subtle { font-weight: 400; font-size: 12px; color: var(--text-dim); }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 9999px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn.primary { background: var(--accent); color: white; border-color: transparent; }
    .btn.danger { background: var(--danger); color: white; border-color: transparent; }
    .btn.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .stepper {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      padding: 0;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    select, input[type="number"], input[type="text"] {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font: inherit;
    }
    input[type="range"] { width: 100%; accent-color: var(--accent); }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .label { font-size: 12px; color: var(--text-dim); white-space: nowrap; }
    .btn-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .empty {
      color: var(--text-dim);
      font-size: 13px;
      padding: 16px 0;
      text-align: center;
    }

    /* App layout */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 5;
    }
    .app-header .title { font-size: 16px; font-weight: 700; }
    .app-header .header-actions { display: flex; gap: 6px; }
    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      padding: 0;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
    }
    .app-main { padding: 10px 10px 76px; }
    .tab-content[data-active="false"] { display: none; }
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 10;
    }
    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 6px 0;
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-size: 11px;
      cursor: pointer;
      position: relative;
    }
    .tab-btn .tab-icon { font-size: 18px; line-height: 1; }
    .tab-btn.active { color: var(--accent); }
    .tab-btn.active::before {
      content: '';
      position: absolute;
      top: 0;
      left: 20%;
      right: 20%;
      height: 3px;
      background: var(--accent);
      border-radius: 0 0 3px 3px;
    }

    /* Mobile compaction: tighter cards so each tab fits one screen */
    @media (max-width: 899px) {
      :root { --pad: 10px; --gap: 10px; --radius: 12px; }
      .card { padding: 10px 12px; margin-bottom: 10px; }
      .card-title { margin-bottom: 6px; font-size: 12px; }
      .card-title-row { margin-bottom: 6px; }
      .row { gap: 6px !important; }
      .btn { padding: 6px 12px; font-size: 12px; }
      .btn-sm { padding: 4px 9px; font-size: 11px; }
      .chord-card { min-width: 120px; max-width: 120px; padding: 8px; }
      .chord-card .chord-name { font-size: 16px; margin-bottom: 6px; padding-right: 18px; }
      .chord-card select { font-size: 11px; padding: 3px 5px; }
      .section-header { display: none; }
      input[type="number"], input[type="text"], select { padding: 5px 8px; font-size: 13px; }
    }

    /* Desktop / tablet: 2-column grid, no vertical scroll */
    @media (min-width: 900px) {
      body { overflow: hidden; }
      .app-main {
        max-width: 1280px;
        margin: 0 auto;
        padding: 12px;
        display: grid;
        grid-template-columns: minmax(320px, 1fr) minmax(420px, 1.3fr);
        grid-template-rows: 1fr auto;
        grid-template-areas:
          "practice fretboard"
          "backing  backing";
        gap: 12px;
        height: calc(100vh - 56px);
        align-content: start;
      }
      .tab-content[data-tab="practice"]  { grid-area: practice; display: flex; flex-direction: column; gap: 10px; min-height: 0; overflow: auto; }
      .tab-content[data-tab="fretboard"] { grid-area: fretboard; display: flex; flex-direction: column; gap: 10px; min-height: 0; overflow: auto; }
      .tab-content[data-tab="backing"]   { grid-area: backing; display: block; }
      .tab-content[data-active="false"]  { display: flex; } /* override: always visible on desktop */
      .tab-content[data-tab="backing"][data-active="false"] { display: block; }
      .tab-bar { display: none; }
      .section-header { display: none; }
      .card { margin-bottom: 0; }
      .card-title { margin-bottom: 8px; }
    }

    /* Beat indicator */
    .beat-dots {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .beat-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--border);
      border: 1px solid var(--text-dim);
    }
    .beat-dot.accent { background: var(--accent); border-color: var(--accent); }

    /* Chord list */
    .chord-list {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .chord-card {
      min-width: 140px;
      max-width: 140px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      position: relative;
      flex-shrink: 0;
    }
    .chord-card .card-x {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--text-dim);
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .chord-card .card-x:hover { color: var(--danger); }
    .chord-card .chord-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
      padding-right: 20px;
    }
    .chord-card .chord-controls {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 8px;
    }
    .chord-card select {
      width: 100%;
      font-size: 12px;
      padding: 4px 6px;
    }
    .duration-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .duration-num { font-size: 12px; color: var(--text-dim); flex: 1; text-align: center; }

    /* Suggest */
    .suggest-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    /* Fretboard placeholder */
    .fretboard-placeholder {
      background: var(--surface-2);
      border-radius: 8px;
      color: var(--text-dim);
      font-size: 13px;
    }

    /* Loop status */
    .loop-status {
      font-size: 12px;
      color: var(--text-dim);
      font-family: monospace;
      margin: 8px 0;
    }

    /* Speed row */
    .speed-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .speed-val { font-size: 13px; min-width: 36px; text-align: right; }

    /* Volume sliders */
    .vol-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .vol-label { font-size: 13px; min-width: 72px; }
    .vol-val { font-size: 12px; min-width: 36px; text-align: right; color: var(--text-dim); }

    /* Drawer */
    .drawer-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
    }
    .drawer-panel {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--surface);
      border-radius: 16px 16px 0 0;
      max-height: 80vh;
      overflow-y: auto;
      padding: 16px;
      z-index: 101;
      transform: translateY(100%);
      transition: transform 0.25s;
    }
    .drawer[data-open="true"] .drawer-panel { transform: translateY(0); }
    .drawer[data-open="false"] .drawer-backdrop { display: none; }
    .drawer[data-open="false"] .drawer-panel { transform: translateY(100%); }
    .drawer-handle {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 12px;
    }
    .drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .drawer-title { font-size: 16px; font-weight: 700; }
    .close-btn {
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-size: 20px;
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }
    .close-btn:hover { color: var(--text); }

    /* Instrument buttons */
    .instrument-grid {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    /* Favorites */
    .favorites-list { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }

    /* Big play button */
    #playBtn { font-size: 15px; padding: 10px 28px; }

    /* Bpm input */
    #bpmInput { width: 72px; text-align: center; font-size: 16px; font-weight: 700; }

    /* Theme toggle row */
    .theme-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-top: 1px solid var(--border);
      margin-top: 12px;
    }
    .theme-row .label { font-size: 13px; color: var(--text); }
  </style>
</head>
<body>
  <header class="app-header">
    <span class="title">🎸 Guitar Master</span>
    <div class="header-actions">
      <button class="icon-btn" id="themeBtn" title="테마 전환">🌙</button>
      <button class="icon-btn" id="shareBtn" title="공유">🔗</button>
      <button class="icon-btn" id="settingsBtn" title="설정">⚙️</button>
    </div>
  </header>

  <main class="app-main">

    <!-- Tab 1: 연습 -->
    <section class="tab-content" data-tab="practice" data-active="true" id="tab-practice">
      <div class="section-header">🥁 연습</div>

      <!-- 메트로놈 -->
      <div class="card">
        <div class="card-title">🥁 메트로놈</div>
        <div class="row" style="flex-wrap:wrap;">
          <span class="label">BPM</span>
          <input type="number" id="bpmInput" min="40" max="240" value="120" style="width:64px;">
          <button class="btn btn-sm" id="tapBtn">TAP</button>
          <span class="label" style="margin-left:8px;">박자</span>
          <select id="timeSigSelect">
            <option value="2/2">2/2</option>
            <option value="3/4">3/4</option>
            <option value="4/4" selected>4/4</option>
            <option value="6/8">6/8</option>
          </select>
        </div>
        <div class="row" style="flex-wrap:wrap;">
          <span class="label">분할</span>
          <div class="btn-row" id="subdivisionBtns" style="margin-bottom:0; gap:4px;">
            <button class="btn btn-sm active" data-subdivision="quarter">♩</button>
            <button class="btn btn-sm" data-subdivision="eighth">♫</button>
            <button class="btn btn-sm" data-subdivision="sixteenth">♬</button>
            <button class="btn btn-sm" data-subdivision="triplet">♪♪♪</button>
          </div>
          <div class="btn-row" id="soundBtns" style="margin-bottom:0; gap:4px; margin-left:8px;">
            <button class="btn btn-sm active" data-sound="click">비프</button>
            <button class="btn btn-sm" data-sound="drum">드럼</button>
          </div>
          <button class="btn btn-sm" id="countInBtn" style="margin-left:auto;">카운트인</button>
        </div>
        <div class="row" style="align-items:center; gap:10px;">
          <button class="btn primary" id="playBtn" style="flex:0 0 auto;">▶ 재생</button>
          <div id="beatIndicator" class="beat-dots" style="margin-top:0;"></div>
        </div>
      </div>

      <!-- 코드 진행 -->
      <div class="card">
        <div class="card-title-row">
          🎹 코드진행
          <span class="subtle">현재: <span id="currentChordLabel">-</span></span>
        </div>
        <div class="row">
          <span class="label">곡의 키:</span>
          <select id="songKeySelect">
            <option>C</option><option>C#</option><option>Db</option>
            <option>D</option><option>D#</option><option>Eb</option>
            <option>E</option><option>F</option><option>F#</option>
            <option>Gb</option><option>G</option><option>G#</option>
            <option>Ab</option><option>A</option><option>A#</option>
            <option>Bb</option><option>B</option>
          </select>
          <button class="btn btn-sm" id="songKeyDetectBtn">첫 코드로 자동 설정</button>
        </div>
        <div class="row">
          <span class="label">프리셋</span>
          <select id="presetSelect">
            <option value="">— 선택 —</option>
          </select>
        </div>
        <div class="row">
          <input type="text" id="chordInput" placeholder="Cmaj7, F#m7b5, Bb13..." style="flex:1; min-width:0;">
          <button class="btn primary btn-sm" id="chordAddBtn">추가</button>
        </div>
        <div class="row">
          <button class="btn btn-sm" id="addBasicBtn">+ 기본 코드</button>
          <button class="btn btn-sm danger" id="resetProgBtn">초기화</button>
        </div>
        <div id="chordList" class="chord-list"></div>
      </div>

      <!-- 추천 스케일 -->
      <div class="card">
        <div class="card-title-row">
          🎼 추천 스케일
          <span id="suggestRoleLabel" class="subtle"></span>
        </div>
        <div id="suggestEmpty" class="empty">코드를 추가하면 추천이 표시됩니다.</div>
        <div id="suggestList" class="suggest-list"></div>
      </div>
    </section>

    <!-- Tab 2: 프렛 -->
    <section class="tab-content" data-tab="fretboard" data-active="false" id="tab-fretboard">
      <div class="section-header">🎸 프렛</div>

      <!-- 악기 -->
      <div class="card">
        <div class="card-title">악기</div>
        <div class="instrument-grid" id="instrumentBtns">
          <button class="btn btn-sm active" data-instrument="guitar">🎸 기타</button>
          <button class="btn btn-sm" data-instrument="bass4">🎸 4현</button>
          <button class="btn btn-sm" data-instrument="bass5">🎸 5현</button>
          <button class="btn btn-sm" data-instrument="violin">🎻 바이올린</button>
        </div>
        <div>
          <button class="btn btn-sm" id="leftHandedBtn">왼손잡이</button>
        </div>
      </div>

      <!-- 스케일 설정 -->
      <div class="card">
        <div class="card-title">스케일 설정</div>
        <div class="row">
          <span class="label">키</span>
          <select id="scaleKeySelect">
            <option>C</option><option>C#</option><option>Db</option>
            <option>D</option><option>D#</option><option>Eb</option>
            <option>E</option><option>F</option><option>F#</option>
            <option>Gb</option><option>G</option><option>G#</option>
            <option>Ab</option><option>A</option><option>A#</option>
            <option>Bb</option><option>B</option>
          </select>
        </div>
        <div class="row">
          <span class="label">스케일</span>
          <select id="scaleTypeSelect">
            <optgroup label="기본 모드 (메이저)">
              <option value="major">메이저 (이오니안)</option>
              <option value="dorian">도리안</option>
              <option value="phrygian">프리지안</option>
              <option value="lydian">리디안</option>
              <option value="mixolydian">믹솔리디안</option>
              <option value="minor">에올리안 (내추럴 마이너)</option>
              <option value="locrian">로크리안</option>
            </optgroup>
            <optgroup label="펜타토닉 / 블루스">
              <option value="majorPentatonic">메이저 펜타토닉</option>
              <option value="minorPentatonic">마이너 펜타토닉</option>
              <option value="minorBluesScale">마이너 블루스</option>
              <option value="majorBluesScale">메이저 블루스</option>
              <option value="mixoBluesScale">믹소 블루스</option>
            </optgroup>
            <optgroup label="멜로딕 마이너 모드">
              <option value="melodicMinor">멜로딕 마이너</option>
              <option value="dorianb2">도리안 b2</option>
              <option value="lydianAugmented">리디안 어그멘티드</option>
              <option value="lydianDominant">리디안 도미넌트</option>
              <option value="mixolydianb6">믹솔리디안 b6</option>
              <option value="locrianNat2">로크리안 #2 (하프디미니쉬드)</option>
              <option value="altered">얼터드 (수퍼 로크리안)</option>
            </optgroup>
            <optgroup label="하모닉 마이너 모드">
              <option value="harmonicMinor">하모닉 마이너</option>
              <option value="locrianNat6">로크리안 내추럴 6</option>
              <option value="ionianAugmented">이오니안 어그멘티드</option>
              <option value="dorian_sharp4">도리안 #4</option>
              <option value="phrygianDominant">프리지안 도미넌트</option>
              <option value="lydian_sharp2">리디안 #2</option>
              <option value="superLocrianbb7">수퍼 로크리안 bb7</option>
            </optgroup>
            <optgroup label="디미니쉬드 / 비밥">
              <option value="halfWholeDim">하프-홀 디미니쉬드</option>
              <option value="wholeHalfDim">홀-하프 디미니쉬드</option>
              <option value="bebopDominant">비밥 도미넌트</option>
              <option value="bebopMajor">비밥 메이저</option>
              <option value="bebopDorian">비밥 도리안</option>
              <option value="bebopMelodicMinor">비밥 멜로딕 마이너</option>
              <option value="bebop">비밥 (기본)</option>
            </optgroup>
            <optgroup label="대칭 / 기타">
              <option value="wholeTone">홀톤</option>
              <option value="augmentedScale">어그멘티드</option>
              <option value="chromatic">크로매틱</option>
            </optgroup>
            <optgroup label="월드 / 이그조틱">

      let saved = null;
      try { saved = JSON.parse(localStorage.getItem(LS_KEY) || 'null'); } catch (e) {}
      return mergeDefaults(defaultState, saved || {});
    }

    function mergeDefaults(defaults, saved) {
      const out = { ...defaults };
      for (const k of Object.keys(defaults)) {
        if (saved[k] !== undefined) {
          if (typeof defaults[k] === 'object' && defaults[k] !== null && !Array.isArray(defaults[k])) {
            out[k] = { ...defaults[k], ...saved[k] };
          } else {
            out[k] = saved[k];
          }
        }
      }
      return out;
    }

    let saveTimer = null;
    function saveState() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (e) { console.warn(e); }
      }, 200);
    }

      Object.assign(state, patch);

        function classifyChordForSuggestions(chord) {
            if (!chord) return null;
            const q = chord.quality;
            const s = chord.seventh || '';
            const t = chord.tensions || [];
            const has = function(x) { return t.indexOf(x) !== -1; };

            if (q === 'diminished7') return 'dim7';
            if (q === 'halfDiminished') return 'm7b5';
            if (q === 'augmented') return 'aug';

            if (q === 'minor') {
                if (s === 'major7') return 'mMaj7';
                if (s === 'dominant') return 'm7';
                if (has('13') && !s) return 'm6';
                return 'm';
            }

            if (q === 'major') {
                if (s === 'major7') {
                    if (has('#11')) return 'maj7#11';
                    return 'maj7';
                }
                if (s === 'dominant') {
                    const altish = (has('b9') || has('#9')) && (has('b13') || has('#11'));
                    if (altish) return '7alt';
                    if (has('#11') && !has('b9') && !has('#9') && !has('b13')) return '7#11';
                    if (has('b9')) return '7b9';
                    if (has('b13')) return '7b13';
                    return '7';
                }
                return 'maj';
            }

            if (q === 'diminished') return 'dim7';
            return null;
        }

    // ── Chord parser ───────────────────────────────────────────────────────────
    const FLAT_TO_SHARP = { 'Db':'C#', 'Eb':'D#', 'Gb':'F#', 'Ab':'G#', 'Bb':'A#' };
    function normalizeRoot(r) { return FLAT_TO_SHARP[r] || r; }

    function parseChord(input) {
      if (!input || typeof input !== 'string') return null;
      const s = input.trim();
      const rootMatch = s.match(/^([A-G])([#b]?)/);
      if (!rootMatch) return null;
      let root = normalizeRoot(rootMatch[1] + (rootMatch[2] || ''));
      let rest = s.slice(rootMatch[0].length);

      let quality = 'major';
      let seventh = '';

      if (/^m7b5/.test(rest) || /^ø7?/.test(rest)) {
        quality = 'halfDiminished'; seventh = 'dominant';
        rest = rest.replace(/^m7b5/, '').replace(/^ø7?/, '');
      } else if (/^dim7/i.test(rest) || /^°7/.test(rest)) {
        quality = 'diminished7';
        rest = rest.replace(/^dim7/i, '').replace(/^°7/, '');
      } else if (/^dim/i.test(rest) || /^°/.test(rest)) {
        quality = 'diminished';
        rest = rest.replace(/^dim/i, '').replace(/^°/, '');
      } else if (/^aug/i.test(rest) || /^\+/.test(rest)) {
        quality = 'augmented';
        rest = rest.replace(/^aug/i, '').replace(/^\+/, '');
      } else if (/^(mMaj7|mM7|m\(maj7\)|minMaj7)/.test(rest)) {
        quality = 'minor'; seventh = 'major7';
        rest = rest.replace(/^(mMaj7|mM7|m\(maj7\)|minMaj7)/, '');
      } else if (/^(maj7|M7|Δ7?)/.test(rest)) {
        quality = 'major'; seventh = 'major7';
        rest = rest.replace(/^(maj7|M7|Δ7?)/, '');
      } else if (/^(m|min|-)/.test(rest)) {
        quality = 'minor';
        rest = rest.replace(/^(m|min|-)/, '');
        if (/^7/.test(rest)) { seventh = 'dominant'; rest = rest.slice(1); }
      } else if (/^(7|9|11|13)/.test(rest)) {
        seventh = 'dominant';
        if (/^7/.test(rest)) rest = rest.slice(1);
      }

      const tensions = [];
      const tensionRe = /([b#]?)(13|11|9|5)/g;
      let m;
      while ((m = tensionRe.exec(rest)) !== null) {
        const acc = m[1], num = m[2];
        if (num === '5') {
          if (acc === 'b' || acc === '#') tensions.push(acc + '5');
        } else {
          tensions.push((acc || '') + num);
        }
      }
      const seen = new Set();
      const uniq = [];
      for (const t of tensions) { if (!seen.has(t)) { seen.add(t); uniq.push(t); } }

      return { root, quality, seventh, tensions: uniq, duration: 4, extras: [] };
    }

    function runChordParserTests() {
      const cases = [
        ['C',        { root:'C',  quality:'major',          seventh:'',         tensions:[] }],
        ['Cmaj7',    { root:'C',  quality:'major',          seventh:'major7',   tensions:[] }],
        ['Cm7',      { root:'C',  quality:'minor',          seventh:'dominant', tensions:[] }],
        ['Cm7b5',    { root:'C',  quality:'halfDiminished', seventh:'dominant', tensions:[] }],
        ['Cdim7',    { root:'C',  quality:'diminished7',    seventh:'',         tensions:[] }],
        ['C7b9',     { root:'C',  quality:'major',          seventh:'dominant', tensions:['b9'] }],
        ['F#m7b5',   { root:'F#', quality:'halfDiminished', seventh:'dominant', tensions:[] }],
        ['Bb13',     { root:'A#', quality:'major',          seventh:'dominant', tensions:['13'] }],
        ['Cmaj7#11', { root:'C',  quality:'major',          seventh:'major7',   tensions:['#11'] }],
        ['CmMaj7',   { root:'C',  quality:'minor',          seventh:'major7',   tensions:[] }],
      ];
      let pass = 0, fail = 0;
      for (const [input, expected] of cases) {
        const got = parseChord(input);
        const ok = got && got.root === expected.root
          && got.quality === expected.quality
          && got.seventh === expected.seventh
          && JSON.stringify(got.tensions) === JSON.stringify(expected.tensions);
        if (ok) pass++;
        else { fail++; console.warn('chord parser FAIL', input, '→', got, 'expected', expected); }
      }
      console.log('chord parser: ' + pass + '/' + (pass + fail) + ' passed');
    }
    runChordParserTests();

    // ── Helpers ────────────────────────────────────────────────────────────────
    function fmtPct(v) { return Math.round(v * 100) + '%'; }

    function chordDisplayName(chord) {
      const { root, quality, seventh, tensions } = chord;
      let suffix = '';
      if (quality === 'major') {
        if (seventh === 'major7') suffix = 'maj7';
        else if (seventh === 'dominant') suffix = '7';
        else suffix = '';
      } else if (quality === 'minor') {
        if (seventh === 'dominant') suffix = 'm7';
        else if (seventh === 'major7') suffix = 'mMaj7';
        else suffix = 'm';
      } else if (quality === 'halfDiminished') {
        suffix = 'm7b5';
      } else if (quality === 'diminished7') {
        suffix = 'dim7';
      } else if (quality === 'diminished') {
        suffix = 'dim';
      } else if (quality === 'augmented') {
        suffix = 'aug';
      } else {
        suffix = quality || '';
      }
      const tens = (tensions && tensions.length) ? tensions.join('') : '';
      return root + suffix + tens;
    }

      if (state.chordProgression.length === 0) {
        empty.style.display = '';
        list.style.display = 'none';
      } else {
        empty.style.display = 'none';
        list.style.display = '';
      }
    }

    // ── Render: Volume values ──────────────────────────────────────────────────
    function renderVolumes() {
      document.getElementById('volMetronome').value = state.volumes.metronome;
      document.getElementById('volMetronomeVal').textContent = fmtPct(state.volumes.metronome);
      document.getElementById('volChord').value = state.volumes.chord;
      document.getElementById('volChordVal').textContent = fmtPct(state.volumes.chord);
      document.getElementById('volDrum').value = state.volumes.drum;
      document.getElementById('volDrumVal').textContent = fmtPct(state.volumes.drum);
      document.getElementById('volFretboard').value = state.volumes.fretboard;
      document.getElementById('volFretboardVal').textContent = fmtPct(state.volumes.fretboard);
    }

    // ── Theme ──────────────────────────────────────────────────────────────────
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      const themeBtn = document.getElementById('themeBtn');
      themeBtn.textContent = theme === 'dark' ? '☀️' : '🌙';
      const drawerThemeBtn = document.getElementById('drawerThemeBtn');
      drawerThemeBtn.textContent = theme === 'dark' ? '라이트 모드로' : '다크 모드로';
    }

    // ── Tabs ───────────────────────────────────────────────────────────────────
    function applyActiveTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(sec => {
        sec.dataset.active = sec.dataset.tab === tabName ? 'true' : 'false';
      });
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tabName);
      });
    }

    // ── Play button ────────────────────────────────────────────────────────────
    let isPlaying = false;
    function togglePlay() {
      isPlaying = !isPlaying;
      const btn = document.getElementById('playBtn');
      btn.textContent = isPlaying ? '■ 정지' : '▶ 재생';
    }

    // ── Init ───────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      // Apply persisted state
      applyTheme(state.theme);
      applyActiveTab(state.activeTab);

      // BPM
      document.getElementById('bpmInput').value = state.bpm;
      // Time sig
      document.getElementById('timeSigSelect').value = state.timeSignature;
      // Subdivision
      document.querySelectorAll('#subdivisionBtns [data-subdivision]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.subdivision === state.subdivision);
      });
      // Sound
      document.querySelectorAll('#soundBtns [data-sound]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.sound === state.metronomeSound);
      });
      // Count in
      document.getElementById('countInBtn').classList.toggle('active', state.countIn);
      // Song key
      document.getElementById('songKeySelect').value = state.songKey;
      // Instrument
      document.querySelectorAll('#instrumentBtns [data-instrument]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.instrument === state.instrument);
      });
      // Left handed
      document.getElementById('leftHandedBtn').classList.toggle('active', state.leftHanded);
      // Scale key
      document.getElementById('scaleKeySelect').value = state.scaleKeyCenter;
      // Scale type
      document.getElementById('scaleTypeSelect').value = state.scaleType;
      // Speed
      document.getElementById('speedSlider').value = state.backing.speed;
      document.getElementById('speedVal').textContent = Number(state.backing.speed).toFixed(1) + 'x';

      renderBeatIndicator();
      renderChordList();
      renderSuggestEmpty();
      renderVolumes();

      // ── Event listeners ────────────────────────────────────────────────────

      // Theme toggle (header)
      document.getElementById('themeBtn').addEventListener('click', () => {
        const newTheme = state.theme === 'dark' ? 'light' : 'dark';
        setState({ theme: newTheme });
        applyTheme(newTheme);
      });

      // Share button
      document.getElementById('shareBtn').addEventListener('click', () => {
        if (navigator.share) {
          navigator.share({ title: 'Guitar Master', url: location.href }).catch(() => {});
        } else {
          navigator.clipboard && navigator.clipboard.writeText(location.href);
        }
      });

      // Settings drawer open
      document.getElementById('settingsBtn').addEventListener('click', () => {
        document.getElementById('settingsDrawer').dataset.open = 'true';
      });
      document.getElementById('drawerCloseBtn').addEventListener('click', () => {
        document.getElementById('settingsDrawer').dataset.open = 'false';
      });
      document.getElementById('drawerBackdrop').addEventListener('click', () => {
        document.getElementById('settingsDrawer').dataset.open = 'false';
      });

      // Drawer theme button
      document.getElementById('drawerThemeBtn').addEventListener('click', () => {
        const newTheme = state.theme === 'dark' ? 'light' : 'dark';
        setState({ theme: newTheme });
        applyTheme(newTheme);
      });

      // Tab bar
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          setState({ activeTab: btn.dataset.tab });
          applyActiveTab(btn.dataset.tab);
        });
      });

      // BPM input
      document.getElementById('bpmInput').addEventListener('input', e => {
        const v = parseInt(e.target.value, 10);
        if (v >= 40 && v <= 240) setState({ bpm: v });
      });

      // Time signature
      document.getElementById('timeSigSelect').addEventListener('change', e => {
        setState({ timeSignature: e.target.value });
        renderBeatIndicator();
      });

      // Subdivision
      document.querySelectorAll('#subdivisionBtns [data-subdivision]').forEach(btn => {
        btn.addEventListener('click', () => {
          setState({ subdivision: btn.dataset.subdivision });
          document.querySelectorAll('#subdivisionBtns [data-subdivision]').forEach(b => {
            b.classList.toggle('active', b.dataset.subdivision === state.subdivision);
          });
        });
      });

      // Sound
      document.querySelectorAll('#soundBtns [data-sound]').forEach(btn => {
        btn.addEventListener('click', () => {
          setState({ metronomeSound: btn.dataset.sound });
          document.querySelectorAll('#soundBtns [data-sound]').forEach(b => {
            b.classList.toggle('active', b.dataset.sound === state.metronomeSound);
          });
        });
      });

      // Count in
      document.getElementById('countInBtn').addEventListener('click', () => {
        setState({ countIn: !state.countIn });
        document.getElementById('countInBtn').classList.toggle('active', state.countIn);
      });

      // TAP
      document.getElementById('tapBtn').addEventListener('click', () => {
        console.log('[gtmaster] TAP at', Date.now());
      });

      // Play / Stop
      document.getElementById('playBtn').addEventListener('click', togglePlay);

      // Song key
      document.getElementById('songKeySelect').addEventListener('change', e => {
        setState({ songKey: e.target.value });
      });

      // Song key auto-detect from first chord
      document.getElementById('songKeyDetectBtn').addEventListener('click', () => {
        if (state.chordProgression.length > 0) {
          const root = state.chordProgression[0].root;
          setState({ songKey: root });
          document.getElementById('songKeySelect').value = root;
        }
      });

      // Preset
      (function populatePresets() {
        const sel = document.getElementById('presetSelect');
        if (!sel) return;
        for (const key of Object.keys(chordPresets)) {
          const opt = document.createElement('option');
          opt.value = key;
          opt.textContent = chordPresets[key].label;
          sel.appendChild(opt);
        }
      })();
      document.getElementById('presetSelect').addEventListener('change', e => {
        const key = e.target.value;
        if (key && chordPresets[key]) {
          const prog = chordPresets[key].chords.map(parseChord).filter(Boolean);
          setState({ chordProgression: prog });
          if (prog.length > 0) {
            setState({ songKey: prog[0].root });
            document.getElementById('songKeySelect').value = prog[0].root;
          }
          renderChordList();
          renderSuggestEmpty();
        }
        e.target.value = '';
      });

      // Chord add button (parser-driven)
      function addChordFromInput() {
        const inputEl = document.getElementById('chordInput');
        const parsed = parseChord(inputEl.value);
        if (!parsed) {
          inputEl.style.borderColor = 'var(--danger)';
          setTimeout(() => { inputEl.style.borderColor = ''; }, 600);
          return;
        }
        const wasEmpty = state.chordProgression.length === 0;
        const prog = [...state.chordProgression, parsed];
        setState({ chordProgression: prog });
        if (wasEmpty) {
          setState({ songKey: parsed.root });
          document.getElementById('songKeySelect').value = parsed.root;
        }
        renderChordList();
        renderSuggestEmpty();
        inputEl.value = '';
      }
      document.getElementById('chordAddBtn').addEventListener('click', addChordFromInput);
      document.getElementById('chordInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); addChordFromInput(); }
      });

      // Add basic chord
      document.getElementById('addBasicBtn').addEventListener('click', () => {
        const prog = [...state.chordProgression, {
          root: 'C', quality: 'major', seventh: '', tensions: [], duration: 4
        }];
        setState({ chordProgression: prog });
        renderChordList();
        renderSuggestEmpty();
      });

      // Reset progression
      document.getElementById('resetProgBtn').addEventListener('click', () => {
        setState({ chordProgression: [] });
        renderChordList();
        renderSuggestEmpty();
      });

      // Instrument buttons
      document.querySelectorAll('#instrumentBtns [data-instrument]').forEach(btn => {
        btn.addEventListener('click', () => {
          setState({ instrument: btn.dataset.instrument });
          document.querySelectorAll('#instrumentBtns [data-instrument]').forEach(b => {
            b.classList.toggle('active', b.dataset.instrument === state.instrument);
          });
        });
      });

      // Left-handed
      document.getElementById('leftHandedBtn').addEventListener('click', () => {
        setState({ leftHanded: !state.leftHanded });
        document.getElementById('leftHandedBtn').classList.toggle('active', state.leftHanded);
      });

      // Scale key
      document.getElementById('scaleKeySelect').addEventListener('change', e => {
        setState({ scaleKeyCenter: e.target.value });
      });

      // Scale type
      document.getElementById('scaleTypeSelect').addEventListener('change', e => {
        setState({ scaleType: e.target.value });
      });

      // YouTube load (placeholder)
      document.getElementById('ytLoadBtn').addEventListener('click', () => {
        const url = document.getElementById('ytUrlInput').value.trim();
        if (!url) return;
        // Phase 3 will implement
        console.log('[gtmaster] YT load:', url);
      });

      // Loop controls (placeholder)
      document.getElementById('loopABtn').addEventListener('click', () => {
        console.log('[gtmaster] Loop A set');
      });
      document.getElementById('loopBBtn').addEventListener('click', () => {
        console.log('[gtmaster] Loop B set');
      });
      document.getElementById('loopToggleBtn').addEventListener('click', () => {
        const loopEnabled = !state.backing.loopEnabled;
        setState({ backing: { ...state.backing, loopEnabled } });
        document.getElementById('loopToggleBtn').classList.toggle('active', loopEnabled);
      });
      document.getElementById('loopClearBtn').addEventListener('click', () => {
        setState({ backing: { ...state.backing, loopA: null, loopB: null, loopEnabled: false } });
        document.getElementById('loopStatus').innerHTML = 'A: --:--&nbsp;&nbsp;&nbsp;B: --:--';
        document.getElementById('loopToggleBtn').classList.remove('active');
      });

      // Speed slider
      document.getElementById('speedSlider').addEventListener('input', e => {
        const speed = parseFloat(e.target.value);
        setState({ backing: { ...state.backing, speed } });
        document.getElementById('speedVal').textContent = speed.toFixed(1) + 'x';
      });

      // Add favorite (placeholder)
      document.getElementById('addFavoriteBtn').addEventListener('click', () => {
        console.log('[gtmaster] Add favorite placeholder');
      });

      // Volume sliders
      document.getElementById('volMetronome').addEventListener('input', e => {
        const v = parseFloat(e.target.value);
        state.volumes.metronome = v;
        setState({ volumes: { ...state.volumes } });
        document.getElementById('volMetronomeVal').textContent = fmtPct(v);
      });
      document.getElementById('volChord').addEventListener('input', e => {
        const v = parseFloat(e.target.value);
        state.volumes.chord = v;
        setState({ volumes: { ...state.volumes } });
        document.getElementById('volChordVal').textContent = fmtPct(v);
      });
      document.getElementById('volDrum').addEventListener('input', e => {
        const v = parseFloat(e.target.value);
        state.volumes.drum = v;
        setState({ volumes: { ...state.volumes } });
        document.getElementById('volDrumVal').textContent = fmtPct(v);
      });
      document.getElementById('volFretboard').addEventListener('input', e => {
        const v = parseFloat(e.target.value);
        state.volumes.fretboard = v;
        setState({ volumes: { ...state.volumes } });
        document.getElementById('volFretboardVal').textContent = fmtPct(v);
      });
    });
  </script>
</body>
</html>
