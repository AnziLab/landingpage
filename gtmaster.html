<!doctype html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Guitar Master</title>
  <style>
    :root {
      --radius: 14px;
      --gap: 16px;
      --pad: 14px;
    }
    [data-theme="dark"] {
      --bg: #0b1220; --surface: #1f2937; --surface-2: #111827;
      --text: #e5e7eb; --text-dim: #9ca3af;
      --accent: #6366f1; --accent-soft: rgba(99,102,241,0.2);
      --border: rgba(255,255,255,0.08); --danger: #ef4444;
      --success: #10b981;
    }
    [data-theme="light"] {
      --bg: #ffffff; --surface: #f8f9fa; --surface-2: #f1f3f5;
      --text: #111827; --text-dim: #6b7280;
      --accent: #4f46e5; --accent-soft: rgba(79,70,229,0.12);
      --border: rgba(0,0,0,0.08); --danger: #dc2626;
      --success: #059669;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "Noto Sans KR", sans-serif;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--pad);
      margin-bottom: var(--gap);
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 10px;
    }
    .card-title-row {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .subtle { font-weight: 400; font-size: 12px; color: var(--text-dim); }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 9999px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn.primary { background: var(--accent); color: white; border-color: transparent; }
    .btn.danger { background: var(--danger); color: white; border-color: transparent; }
    .btn.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .stepper {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      padding: 0;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    select, input[type="number"], input[type="text"] {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font: inherit;
    }
    input[type="range"] { width: 100%; accent-color: var(--accent); }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .label { font-size: 12px; color: var(--text-dim); white-space: nowrap; }
    .btn-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .empty {
      color: var(--text-dim);
      font-size: 13px;
      padding: 16px 0;
      text-align: center;
    }

    /* App layout */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 5;
    }
    .app-header .title { font-size: 16px; font-weight: 700; }
    .app-header .header-actions { display: flex; gap: 6px; }
    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      padding: 0;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
    }
    .app-main { padding: 10px 10px 76px; }
    .tab-content[data-active="false"] { display: none; }
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 10;
    }
    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 6px 0;
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-size: 11px;
      cursor: pointer;
      position: relative;
    }
    .tab-btn .tab-icon { font-size: 18px; line-height: 1; }
    .tab-btn.active { color: var(--accent); }
    .tab-btn.active::before {
      content: '';
      position: absolute;
      top: 0;
      left: 20%;
      right: 20%;
      height: 3px;
      background: var(--accent);
      border-radius: 0 0 3px 3px;
    }

    /* Mobile compaction: tighter cards so each tab fits one screen */
    @media (max-width: 899px) {
      :root { --pad: 10px; --gap: 10px; --radius: 12px; }
      .card { padding: 10px 12px; margin-bottom: 10px; }
      .card-title { margin-bottom: 6px; font-size: 12px; }
      .card-title-row { margin-bottom: 6px; }
      .row { gap: 6px !important; }
      .btn { padding: 6px 12px; font-size: 12px; }
      .btn-sm { padding: 4px 9px; font-size: 11px; }
      .chord-card { min-width: 120px; max-width: 120px; padding: 8px; }
      .chord-card .chord-name { font-size: 16px; margin-bottom: 6px; padding-right: 18px; }
      .chord-card select { font-size: 11px; padding: 3px 5px; }
      .section-header { display: none; }
      input[type="number"], input[type="text"], select { padding: 5px 8px; font-size: 13px; }
    }

    /* Desktop / tablet: 2-column grid, no vertical scroll */
    @media (min-width: 900px) {
      body { overflow: hidden; }
      .app-main {
        max-width: 1280px;
        margin: 0 auto;
        padding: 12px;
        display: grid;
        grid-template-columns: minmax(320px, 1fr) minmax(420px, 1.3fr);
        grid-template-rows: auto auto 1fr auto;
        grid-template-areas:
          "metronome instr-scale"
          "chords    backing"
          "suggest   backing"
          "fretboard fretboard";
        gap: 12px;
        height: calc(100vh - 56px);
        align-content: stretch;
      }
      /* Flatten tab-content wrappers so individual cards become grid items.
         Override the mobile [data-active="false"] display:none rule. */
      .tab-content,
      .tab-content[data-active="false"] { display: contents; }
      #card-metronome   { grid-area: metronome; }
      #card-chords      { grid-area: chords; }
      #card-suggest     { grid-area: suggest; min-height: 0; overflow-y: auto; }
      #card-instr-scale { grid-area: instr-scale; }
      #backingCard      { grid-area: backing; min-height: 0; overflow-y: auto; }
      #card-fretboard   { grid-area: fretboard; min-height: 0; overflow: hidden; }
      .tab-bar { display: none; }
      .section-header { display: none; }
      .card { margin-bottom: 0; }
      .card-title { margin-bottom: 8px; }
    }

    /* Beat indicator */
    .beat-dots {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .beat-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--border);
      border: 1px solid var(--text-dim);
      transition: background 0.25s, border-color 0.25s;
    }
    .beat-dot.accent { background: var(--accent); border-color: var(--accent); }
    .beat-dot.flash { background: var(--accent); border-color: var(--accent); transition: none; }

    /* Chord list */
    .chord-list {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .chord-card {
      min-width: 116px;
      max-width: 116px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 8px;
      position: relative;
      flex-shrink: 0;
    }
    .chord-card .card-x {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--text-dim);
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .chord-card .card-x:hover { color: var(--danger); }
    .chord-card .chord-name {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
      padding-right: 16px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chord-card .chord-controls {
      display: flex;
      gap: 3px;
      margin-bottom: 4px;
    }
    .chord-card .chord-controls select {
      flex: 1;
      width: auto;
      font-size: 10px;
      padding: 2px 4px;
      min-width: 0;
    }
    .duration-row {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .duration-row .stepper { width: 20px; height: 20px; font-size: 12px; }
    .duration-num { font-size: 11px; color: var(--text-dim); flex: 1; text-align: center; }

    /* Chord card playing highlight */
    .chord-card.playing {
      border-color: var(--success);
      box-shadow: 0 0 0 1px var(--success), 0 0 12px rgba(16, 185, 129, 0.35);
    }

    /* Suggest */
    .suggest-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .suggest-section-header {
      font-size: 11px;
      color: var(--text-dim);
      margin: 8px 0 4px;
      width: 100%;
    }
    .suggest-section-header:first-child { margin-top: 0; }
    .suggest-pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .suggest-chip {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1px;
      padding: 4px 10px;
      border-radius: 9999px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      font-size: 11px;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
      text-align: left;
      max-width: 220px;
    }
    .suggest-chip:hover { opacity: 0.85; }
    .suggest-chip .chip-name { font-weight: 600; white-space: nowrap; }
    .suggest-chip .chip-why { font-size: 10px; opacity: 0.7; line-height: 1.25; white-space: normal; }
    .suggest-chip.contextual { background: var(--accent-soft); border-color: var(--accent); }
    .suggest-chip.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .suggest-chip.active .chip-why { opacity: 0.85; }

    /* Fretboard */
    .fretboard {
      position: relative;
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      background: var(--surface-2);
      border-radius: 10px;
      padding: 6px 0;
    }
    .fretboard-inner {
      position: relative;
      height: 100%;
      min-height: 100px;
    }
    .fb-string {
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      background: rgba(255,255,255,0.18);
    }
    [data-theme="light"] .fb-string { background: rgba(0,0,0,0.18); }
    .fb-fret-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 1px;
      background: rgba(255,255,255,0.12);
    }
    [data-theme="light"] .fb-fret-line { background: rgba(0,0,0,0.12); }
    .fb-fret-line.nut { width: 3px; background: var(--text-dim); }
    .fb-marker {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      transform: translate(-50%, -50%);
    }
    [data-theme="light"] .fb-marker { background: rgba(0,0,0,0.18); }
    .fb-fret-num {
      position: absolute;
      bottom: 0;
      font-size: 9px;
      color: var(--text-dim);
      transform: translateX(-50%);
    }
    .fb-note {
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(0,0,0,0.25);
      user-select: none;
      transition: transform 0.08s;
    }
    .fb-note:active { transform: translate(-50%, -50%) scale(0.85); }
    .fb-note.root { box-shadow: 0 0 0 2px rgba(255,255,255,0.4); }

    /* Loop status */
    .loop-status {
      font-size: 12px;
      color: var(--text-dim);
      font-family: monospace;
      margin: 8px 0;
    }

    /* Speed row */
    .speed-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .speed-val { font-size: 13px; min-width: 36px; text-align: right; }

    /* Volume sliders */
    .vol-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .vol-label { font-size: 13px; min-width: 72px; }
    .vol-val { font-size: 12px; min-width: 36px; text-align: right; color: var(--text-dim); }

    /* Drawer */
    .drawer-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
    }
    .drawer-panel {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--surface);
      border-radius: 16px 16px 0 0;
      max-height: 80vh;
      overflow-y: auto;
      padding: 16px;
      z-index: 101;
      transform: translateY(100%);
      transition: transform 0.25s;
    }
    .drawer[data-open="true"] .drawer-panel { transform: translateY(0); }
    .drawer[data-open="false"] .drawer-backdrop { display: none; }
    .drawer[data-open="false"] .drawer-panel { transform: translateY(100%); }
    .drawer-handle {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 12px;
    }
    .drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .drawer-title { font-size: 16px; font-weight: 700; }
    .close-btn {
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-size: 20px;
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }
    .close-btn:hover { color: var(--text); }

    /* Instrument buttons */
    .instrument-grid {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    /* Favorites */
    .favorites-list { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }

    /* Big play button */
    #playBtn { font-size: 15px; padding: 10px 28px; }

    /* Bpm input */
    #bpmInput { width: 72px; text-align: center; font-size: 16px; font-weight: 700; }

    /* Drum pattern grid */
    .drum-grid {
      display: grid;
      grid-template-columns: 56px repeat(16, 1fr);
      gap: 2px;
      font-size: 10px;
    }
    .drum-grid .drum-label {
      align-self: center;
      color: var(--text-dim);
      padding-right: 6px;
      text-align: right;
      font-weight: 600;
    }
    .drum-grid .drum-cell {
      aspect-ratio: 1;
      min-width: 14px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      cursor: pointer;
      padding: 0;
      transition: background 0.1s;
    }
    .drum-grid .drum-cell.on { background: var(--accent); border-color: var(--accent); }
    .drum-grid .drum-cell.beat-mark { border-left: 1px solid var(--accent-soft); }
    .drum-grid .drum-cell.playing { box-shadow: 0 0 0 2px var(--success); }

    /* Theme toggle row */
    .theme-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-top: 1px solid var(--border);
      margin-top: 12px;
    }
    .theme-row .label { font-size: 13px; color: var(--text); }
  </style>
</head>
<body>
  <header class="app-header">
    <span class="title">🎸 Guitar Master</span>
    <div class="header-actions">
      <button class="icon-btn" id="themeBtn" title="테마 전환">🌙</button>
      <button class="icon-btn" id="shareBtn" title="공유">🔗</button>
      <button class="icon-btn" id="settingsBtn" title="설정">⚙️</button>
    </div>
  </header>

  <main class="app-main">

    <!-- Tab 1: 연습 -->
    <section class="tab-content" data-tab="practice" data-active="true" id="tab-practice">
      <div class="section-header">🥁 연습</div>

      <!-- 메트로놈 -->
      <div class="card" id="card-metronome">
        <div class="card-title">🥁 메트로놈</div>
        <div class="row" style="flex-wrap:wrap;">
          <span class="label">BPM</span>
          <input type="number" id="bpmInput" min="40" max="240" value="120" style="width:64px;">
          <button class="btn btn-sm" id="tapBtn">TAP</button>
          <span class="label" style="margin-left:8px;">박자</span>
          <select id="timeSigSelect">
            <option value="2/2">2/2</option>
            <option value="3/4">3/4</option>
            <option value="4/4" selected>4/4</option>
            <option value="6/8">6/8</option>
          </select>
        </div>
        <div class="row" style="flex-wrap:wrap;">
          <span class="label">분할</span>
          <div class="btn-row" id="subdivisionBtns" style="margin-bottom:0; gap:4px;">
            <button class="btn btn-sm active" data-subdivision="quarter">♩</button>
            <button class="btn btn-sm" data-subdivision="eighth">♫</button>
            <button class="btn btn-sm" data-subdivision="sixteenth">♬</button>
            <button class="btn btn-sm" data-subdivision="triplet">♪♪♪</button>
          </div>
          <div class="btn-row" id="soundBtns" style="margin-bottom:0; gap:4px; margin-left:8px;">
            <button class="btn btn-sm active" data-sound="click">비프</button>
            <button class="btn btn-sm" data-sound="drum">드럼</button>
          </div>
          <button class="btn btn-sm" id="countInBtn" style="margin-left:auto;">카운트인</button>
        </div>
        <div class="row" style="align-items:center; gap:10px;">
          <button class="btn primary" id="playBtn" style="flex:0 0 auto;">▶ 재생</button>
          <div id="beatIndicator" class="beat-dots" style="margin-top:0;"></div>
        </div>
      </div>

      <!-- 코드 진행 -->
      <div class="card" id="card-chords">
        <div class="card-title-row">
          🎹 코드진행
          <span class="subtle">현재: <span id="currentChordLabel">-</span></span>
        </div>
        <div class="row" style="flex-wrap:wrap;">
          <span class="label">키</span>
          <select id="songKeySelect">
            <option>C</option><option>C#</option><option>D</option>
            <option>D#</option><option>E</option><option>F</option>
            <option>F#</option><option>G</option><option>G#</option>
            <option>A</option><option>A#</option><option>B</option>
          </select>
          <button class="btn btn-sm" id="songKeyDetectBtn" title="첫 코드의 루트를 곡의 키로">자동</button>
          <span class="label" style="margin-left:8px;">프리셋</span>
          <select id="presetSelect" style="flex:1; min-width:120px;">
            <option value="">— 선택 —</option>
          </select>
        </div>
        <div class="row" style="flex-wrap:wrap;">
          <input type="text" id="chordInput" placeholder="Cmaj7, F#m7b5, Bb13..." style="flex:1; min-width:120px;">
          <button class="btn primary btn-sm" id="chordAddBtn">추가</button>
          <button class="btn btn-sm" id="addBasicBtn">+ 기본</button>
          <button class="btn btn-sm danger" id="resetProgBtn">초기화</button>
        </div>
        <div id="chordList" class="chord-list"></div>
      </div>

      <!-- 추천 스케일 -->
      <div class="card" id="card-suggest">
        <div class="card-title-row">
          🎼 추천 스케일
          <span id="suggestRoleLabel" class="subtle"></span>
        </div>
        <div id="suggestEmpty" class="empty">코드를 추가하면 추천이 표시됩니다.</div>
        <div id="suggestList" class="suggest-list"></div>
      </div>
    </section>

    <!-- Tab 2: 프렛 -->
    <section class="tab-content" data-tab="fretboard" data-active="false" id="tab-fretboard">
      <div class="section-header">🎸 프렛</div>

      <!-- 악기 + 스케일 (한 카드에 합침) -->
      <div class="card" id="card-instr-scale">
        <div class="row" style="flex-wrap:wrap; align-items:center; gap:6px;">
          <div class="btn-row" id="instrumentBtns" style="gap:4px; margin-bottom:0;">
            <button class="btn btn-sm active" data-instrument="guitar">🎸 기타</button>
            <button class="btn btn-sm" data-instrument="bass4">🎸 4현</button>

  <script>
    // ── State ──────────────────────────────────────────────────────────────────
    const defaultState = {
      bpm: 120,
      timeSignature: '4/4',
      subdivision: 'quarter',
      metronomeSound: 'click',
      countIn: false,
      songKey: 'C',
      chordProgression: [],
      instrument: 'guitar',
      scaleKeyCenter: 'C',
      scaleType: 'major',
      leftHanded: false,
      drumPattern: { kick: [], snare: [], hihat: [], crash: [] },
      volumes: { metronome: 0.5, chord: 0.5, drum: 0.7, fretboard: 0.7 },
      theme: 'dark',
      activeTab: 'practice',
      syncCode: null,    // when set, state mirrors to Pantry under this 6-char key
      backing: {
        videoId: null, loopA: null, loopB: null,
        loopEnabled: false, speed: 1.0, favorites: []
      }
    };

    const LS_KEY = 'gtmaster.state.v1';
    let state = loadState();

    function loadState() {
      let saved = null;
      try { saved = JSON.parse(localStorage.getItem(LS_KEY) || 'null'); } catch (e) {}
      return mergeDefaults(defaultState, saved || {});
    }

    function mergeDefaults(defaults, saved) {
      const out = { ...defaults };
      for (const k of Object.keys(defaults)) {
        if (saved[k] !== undefined) {
          if (typeof defaults[k] === 'object' && defaults[k] !== null && !Array.isArray(defaults[k])) {
            out[k] = { ...defaults[k], ...saved[k] };
          } else {
            out[k] = saved[k];
          }
        }
      }
      return out;
    }

    let saveTimer = null;
    function saveState() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(flushSaveState, 200);
    }
    function flushSaveState() {
      clearTimeout(saveTimer);
      saveTimer = null;
      try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (e) { console.warn(e); }
    }
    // Flush pending saves before the page is hidden / unloaded so values typed
    // milliseconds before close still persist.
    window.addEventListener('pagehide', flushSaveState);
    window.addEventListener('beforeunload', flushSaveState);
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') flushSaveState();
    });

    function setState(patch) {
      Object.assign(state, patch);
      saveState();
      scheduleSyncUpload();
    }

    // ── Cloud sync via Pantry ─────────────────────────────────────────────────
    // Pantry: free anonymous JSON store. Each sync code is a separate basket.
    // Anyone with the code (and our pantry id) can read/write that basket, so
    // codes must be hard-to-guess. We use 6 alphanumeric chars from a 32-symbol
    // alphabet → 32^6 ≈ 1 billion combinations, fine for a personal app.
    const PANTRY_ID = 'a4ee7bd7-9ce5-41eb-9ecc-5c4b6adc6ae3';
    const PANTRY_BASE = 'https://getpantry.cloud/apiv1/pantry/' + PANTRY_ID + '/basket/';
    const SYNC_ALPHABET = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // no 0/O/1/I confusion
    let syncUploadTimer = null;
    let lastSyncedAt = 0;

    function generateSyncCode() {
      let s = '';
      for (let i = 0; i < 6; i++) {
        s += SYNC_ALPHABET[Math.floor(Math.random() * SYNC_ALPHABET.length)];
      }
      return s;
    }

    function setSyncStatus(text) {
      const el = document.getElementById('syncStatus');
      if (el) el.textContent = text;
    }

    function updateSyncUI() {
      const off = document.getElementById('syncOff');
      const on  = document.getElementById('syncOn');
      const display = document.getElementById('syncCodeDisplay');
      if (!off || !on || !display) return;
      if (state.syncCode) {
        off.style.display = 'none';
        on.style.display = 'flex';
        display.textContent = state.syncCode;
      } else {
        off.style.display = 'flex';
        on.style.display = 'none';
        display.textContent = '';
      }
    }

    async function syncUpload() {
      if (!state.syncCode) return;
      const updatedAt = Date.now();
      const cleanState = { ...state };
      delete cleanState.syncCode;       // don't roundtrip the code itself
      delete cleanState.activeTab;      // tab is per-device
      const payload = { state: cleanState, updatedAt };
      try {
        setSyncStatus('업로드 중...');
        const res = await fetch(PANTRY_BASE + state.syncCode, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        lastSyncedAt = updatedAt;
        setSyncStatus('동기화됨 · ' + new Date().toLocaleTimeString());
      } catch (e) {
        setSyncStatus('업로드 실패 (재시도됩니다)');
        console.warn('sync upload failed', e);
      }
    }

    function scheduleSyncUpload() {
      if (!state.syncCode) return;
      clearTimeout(syncUploadTimer);
      syncUploadTimer = setTimeout(syncUpload, 1500);
    }

    async function syncDownload() {
      if (!state.syncCode) return;
      try {
        const res = await fetch(PANTRY_BASE + state.syncCode);
        if (!res.ok) return;
        const data = await res.json();
        if (!data || !data.state || !data.updatedAt) return;
        if (data.updatedAt <= lastSyncedAt) return; // we have the latest
        // Merge cloud state into local, preserving syncCode and activeTab
        const code = state.syncCode;
        const tab  = state.activeTab;
        Object.keys(defaultState).forEach(k => {
          if (data.state[k] !== undefined && k !== 'syncCode' && k !== 'activeTab') {
            state[k] = data.state[k];
          }
        });
        state.syncCode = code;
        state.activeTab = tab;
        lastSyncedAt = data.updatedAt;
        flushSaveState();
        reapplySyncedUI();
        setSyncStatus('가져옴 · ' + new Date().toLocaleTimeString());
      } catch (e) {
        console.warn('sync download failed', e);
      }
    }

    function reapplySyncedUI() {
      // After a remote state is applied, refresh every UI surface.
      // These functions are defined later in the script; guard with typeof.
      try { applyTheme && applyTheme(state.theme); } catch (e) {}
      try {
        const bpm = document.getElementById('bpmInput'); if (bpm) bpm.value = state.bpm;
        const ts = document.getElementById('timeSigSelect'); if (ts) ts.value = state.timeSignature;
        document.querySelectorAll('#subdivisionBtns [data-subdivision]').forEach(b => {
          b.classList.toggle('active', b.dataset.subdivision === state.subdivision);
        });
        document.querySelectorAll('#soundBtns [data-sound]').forEach(b => {
          b.classList.toggle('active', b.dataset.sound === state.metronomeSound);
        });
        const ci = document.getElementById('countInBtn'); if (ci) ci.classList.toggle('active', state.countIn);
        const sk = document.getElementById('songKeySelect'); if (sk) sk.value = state.songKey;
        document.querySelectorAll('#instrumentBtns [data-instrument]').forEach(b => {
          b.classList.toggle('active', b.dataset.instrument === state.instrument);
        });
        const lh = document.getElementById('leftHandedBtn'); if (lh) lh.classList.toggle('active', state.leftHanded);
        const ks = document.getElementById('scaleKeySelect'); if (ks) ks.value = state.scaleKeyCenter;
        const st = document.getElementById('scaleTypeSelect'); if (st) st.value = state.scaleType;
        const sp = document.getElementById('speedSlider'); if (sp) sp.value = state.backing.speed;
        const spv = document.getElementById('speedVal'); if (spv) spv.textContent = Number(state.backing.speed).toFixed(1) + 'x';
      } catch (e) {}
      try { renderBeatIndicator && renderBeatIndicator(); } catch (e) {}
      try { renderChordList && renderChordList(); } catch (e) {}
      try { renderSuggestions && renderSuggestions(); } catch (e) {}
      try { renderVolumes && renderVolumes(); } catch (e) {}
      try { renderDrumGrid && renderDrumGrid(); } catch (e) {}
      try { renderFretboard && renderFretboard(); } catch (e) {}
      try { renderFavorites && renderFavorites(); } catch (e) {}
      try { updateLoopStatus && updateLoopStatus(); } catch (e) {}
    }

    async function startSync() {
      const code = generateSyncCode();
      state.syncCode = code;
      flushSaveState();
      updateSyncUI();
      await syncUpload();
    }

    async function linkSync(rawCode) {
      const code = (rawCode || '').toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 6);
      if (code.length !== 6) {
        alert('6자리 코드를 입력해주세요.');
        return;
      }
      try {
        setSyncStatus('연결 중...');
        const res = await fetch(PANTRY_BASE + code);
        if (!res.ok) {
          alert('해당 코드의 동기화 정보가 없습니다.');
          return;
        }
        const data = await res.json();
        if (!data || !data.state) {
          alert('동기화 데이터가 비어있습니다.');
          return;
        }
        const tab = state.activeTab;
        Object.keys(defaultState).forEach(k => {
          if (data.state[k] !== undefined && k !== 'syncCode' && k !== 'activeTab') {
            state[k] = data.state[k];
          }
        });
        state.syncCode = code;
        state.activeTab = tab;
        lastSyncedAt = data.updatedAt || 0;
        flushSaveState();
        reapplySyncedUI();
        updateSyncUI();
        setSyncStatus('연결됨 · ' + new Date().toLocaleTimeString());
      } catch (e) {
        alert('연결 실패: ' + (e.message || e));
      }
    }

    function stopSync() {
      state.syncCode = null;
      lastSyncedAt = 0;
      flushSaveState();
      updateSyncUI();
    }

    // Re-pull on visibility / focus so multi-device edits show up quickly
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') syncDownload();
    });
    window.addEventListener('focus', syncDownload);

    // ── Music theory data (copied verbatim from gtpractice.html) ───────────────
        const scalePatterns = {
            // 기본 모드 (메이저)
            major: [0, 2, 4, 5, 7, 9, 11],
            dorian: [0, 2, 3, 5, 7, 9, 10],
            phrygian: [0, 1, 3, 5, 7, 8, 10],
            lydian: [0, 2, 4, 6, 7, 9, 11],
            mixolydian: [0, 2, 4, 5, 7, 9, 10],
            minor: [0, 2, 3, 5, 7, 8, 10],
            locrian: [0, 1, 3, 5, 6, 8, 10],
            // 펜타토닉
            majorPentatonic: [0, 2, 4, 7, 9],
            minorPentatonic: [0, 3, 5, 7, 10],
            // 대칭
            wholeTone: [0, 2, 4, 6, 8, 10],
            // 하모닉 마이너
            harmonicMinor: [0, 2, 3, 5, 7, 8, 11],

        function classifyChordForSuggestions(chord) {
            if (!chord) return null;
            const q = chord.quality;
            const s = chord.seventh || '';
            const t = chord.tensions || [];
            const has = function(x) { return t.indexOf(x) !== -1; };

            if (q === 'diminished7') return 'dim7';
            if (q === 'halfDiminished') return 'm7b5';
            if (q === 'augmented') return 'aug';

            if (q === 'minor') {
                if (s === 'major7') return 'mMaj7';
                if (s === 'dominant') return 'm7';
                if (has('13') && !s) return 'm6';
                return 'm';
            }

            if (q === 'major') {
                if (s === 'major7') {
                    if (has('#11')) return 'maj7#11';
                    return 'maj7';
                }
                if (s === 'dominant') {
                    const altish = (has('b9') || has('#9')) && (has('b13') || has('#11'));
                    if (altish) return '7alt';
                    if (has('#11') && !has('b9') && !has('#9') && !has('b13')) return '7#11';
                    if (has('b9')) return '7b9';
                    if (has('b13')) return '7b13';
                    return '7';
                }
                return 'maj';
            }

            if (q === 'diminished') return 'dim7';
            return null;
        }

        const chordPresets = {

    // ── Chord parser ───────────────────────────────────────────────────────────
    const FLAT_TO_SHARP = { 'Db':'C#', 'Eb':'D#', 'Gb':'F#', 'Ab':'G#', 'Bb':'A#' };
    function normalizeRoot(r) { return FLAT_TO_SHARP[r] || r; }

    function parseChord(input) {
      if (!input || typeof input !== 'string') return null;
      const s = input.trim();
      const rootMatch = s.match(/^([A-G])([#b]?)/);
      if (!rootMatch) return null;
      let root = normalizeRoot(rootMatch[1] + (rootMatch[2] || ''));
      let rest = s.slice(rootMatch[0].length);

      let quality = 'major';
      let seventh = '';

      if (/^m7b5/.test(rest) || /^ø7?/.test(rest)) {
        quality = 'halfDiminished'; seventh = 'dominant';
        rest = rest.replace(/^m7b5/, '').replace(/^ø7?/, '');
      } else if (/^dim7/i.test(rest) || /^°7/.test(rest)) {
        quality = 'diminished7';
        rest = rest.replace(/^dim7/i, '').replace(/^°7/, '');
      } else if (/^dim/i.test(rest) || /^°/.test(rest)) {
        quality = 'diminished';
        rest = rest.replace(/^dim/i, '').replace(/^°/, '');
      } else if (/^aug/i.test(rest) || /^\+/.test(rest)) {
        quality = 'augmented';
        rest = rest.replace(/^aug/i, '').replace(/^\+/, '');
      } else if (/^(mMaj7|mM7|m\(maj7\)|minMaj7)/.test(rest)) {
        quality = 'minor'; seventh = 'major7';
        rest = rest.replace(/^(mMaj7|mM7|m\(maj7\)|minMaj7)/, '');
      } else if (/^(maj7|M7|Δ7?)/.test(rest)) {
        quality = 'major'; seventh = 'major7';
        rest = rest.replace(/^(maj7|M7|Δ7?)/, '');
      } else if (/^(m|min|-)/.test(rest)) {
        quality = 'minor';
        rest = rest.replace(/^(m|min|-)/, '');
        if (/^7/.test(rest)) { seventh = 'dominant'; rest = rest.slice(1); }
      } else if (/^(7|9|11|13)/.test(rest)) {
        seventh = 'dominant';
        if (/^7/.test(rest)) rest = rest.slice(1);
      }

      const tensions = [];
      const tensionRe = /([b#]?)(13|11|9|5)/g;
      let m;
      while ((m = tensionRe.exec(rest)) !== null) {
        const acc = m[1], num = m[2];
        if (num === '5') {
          if (acc === 'b' || acc === '#') tensions.push(acc + '5');
        } else {
          tensions.push((acc || '') + num);
        }
      }
      const seen = new Set();
      const uniq = [];
      for (const t of tensions) { if (!seen.has(t)) { seen.add(t); uniq.push(t); } }

      return { root, quality, seventh, tensions: uniq, duration: 4, extras: [] };
    }

    function runChordParserTests() {
      const cases = [
        ['C',        { root:'C',  quality:'major',          seventh:'',         tensions:[] }],
        ['Cmaj7',    { root:'C',  quality:'major',          seventh:'major7',   tensions:[] }],
        ['Cm7',      { root:'C',  quality:'minor',          seventh:'dominant', tensions:[] }],
        ['Cm7b5',    { root:'C',  quality:'halfDiminished', seventh:'dominant', tensions:[] }],
        ['Cdim7',    { root:'C',  quality:'diminished7',    seventh:'',         tensions:[] }],
        ['C7b9',     { root:'C',  quality:'major',          seventh:'dominant', tensions:['b9'] }],
        ['F#m7b5',   { root:'F#', quality:'halfDiminished', seventh:'dominant', tensions:[] }],
        ['Bb13',     { root:'A#', quality:'major',          seventh:'dominant', tensions:['13'] }],
        ['Cmaj7#11', { root:'C',  quality:'major',          seventh:'major7',   tensions:['#11'] }],
        ['CmMaj7',   { root:'C',  quality:'minor',          seventh:'major7',   tensions:[] }],
      ];
      let pass = 0, fail = 0;
      for (const [input, expected] of cases) {
        const got = parseChord(input);
        const ok = got && got.root === expected.root
          && got.quality === expected.quality
          && got.seventh === expected.seventh
          && JSON.stringify(got.tensions) === JSON.stringify(expected.tensions);
        if (ok) pass++;
        else { fail++; console.warn('chord parser FAIL', input, '→', got, 'expected', expected); }
      }
      console.log('chord parser: ' + pass + '/' + (pass + fail) + ' passed');
    }
    runChordParserTests();

    // ── Helpers ────────────────────────────────────────────────────────────────
    function fmtPct(v) { return Math.round(v * 100) + '%'; }

    function chordDisplayName(chord) {
      const { root, quality, seventh, tensions } = chord;
      let suffix = '';
      if (quality === 'major') {
        if (seventh === 'major7') suffix = 'maj7';
        else if (seventh === 'dominant') suffix = '7';
        else suffix = '';
      } else if (quality === 'minor') {
        if (seventh === 'dominant') suffix = 'm7';
        else if (seventh === 'major7') suffix = 'mMaj7';
        else suffix = 'm';
      } else if (quality === 'halfDiminished') {
        suffix = 'm7b5';
      } else if (quality === 'diminished7') {
        suffix = 'dim7';
      } else if (quality === 'diminished') {
        suffix = 'dim';
      } else if (quality === 'augmented') {
        suffix = 'aug';
      } else {
        suffix = quality || '';
      }
      const tens = (tensions && tensions.length) ? tensions.join('') : '';
      return root + suffix + tens;
    }

    // ── Render: Suggestion chips ───────────────────────────────────────────────
    const SUGGESTION_LABEL_MAP = (() => {
      const out = {};
      // Build lazily on first call so DOM is ready
      return out;
    })();

    function ensureSuggestionLabelMap() {
      if (Object.keys(SUGGESTION_LABEL_MAP).length > 0) return;
      const sel = document.getElementById('scaleTypeSelect');
      if (sel) {
        for (const opt of sel.querySelectorAll('option')) SUGGESTION_LABEL_MAP[opt.value] = opt.textContent;
      }
    }

    function renderSuggestions() {
      ensureSuggestionLabelMap();
      const emptyEl = document.getElementById('suggestEmpty');
      const listEl = document.getElementById('suggestList');
      const roleLabel = document.getElementById('suggestRoleLabel');
      if (!listEl || !emptyEl) return;

      listEl.innerHTML = '';
      if (!state.chordProgression || state.chordProgression.length === 0) {
        emptyEl.style.display = '';
        listEl.style.display = 'none';
        if (roleLabel) roleLabel.textContent = '';
        return;
      }
      emptyEl.style.display = 'none';
      listEl.style.display = '';

      const chord = state.chordProgression[chordPlayback.currentChordIdx];
      if (!chord) return;

      // Role from songKey
      const songKey = state.songKey;
      const role = (songKey && chord.root) ? getChordRoleInKey(chord.root, songKey) : null;
      if (roleLabel) {
        const name = chordDisplayName(chord);
        roleLabel.textContent = role && songKey ? `${name} — ${role} of ${songKey}` : name;
      }

      const type = classifyChordForSuggestions(chord);
      const contextual = (type && role) ? (chordScaleSuggestionsByRole[type + '|' + role] || []) : [];
      const generic = type ? (chordScaleSuggestions[type] || []) : [];

      const seen = new Set(contextual.map(s => s.scale));
      const dedupedGeneric = generic.filter(s => !seen.has(s.scale));

      function makePill(sug, kind) {
        const btn = document.createElement('button');
        btn.className = 'suggest-chip ' + kind;
        if (state.scaleType === sug.scale) btn.classList.add('active');
        const name = SUGGESTION_LABEL_MAP[sug.scale] || sug.scale;
        btn.innerHTML = `<span class="chip-name">${name}</span><span class="chip-why">${sug.why || ''}</span>`;
        btn.addEventListener('click', () => {
          // Most suggestions render from the chord root (e.g., C Lydian over
          // Cmaj7, G Mixolydian over G7). A few — currently Harmonic Minor over
          // a dim7 — must shift by an interval (vii°7 of C minor uses C
          // Harmonic Minor, not B). The optional sug.keyOffset (in semitones)
          // handles those cases.
          const baseRoot = chord.root || state.scaleKeyCenter;
          const offset = sug.keyOffset || 0;
          const baseIdx = NOTE_TO_SEMITONE[baseRoot];
          const newKey = (baseIdx !== undefined && offset)
            ? NOTE_NAMES_FRETBOARD[((baseIdx + offset) % 12 + 12) % 12]
            : baseRoot;
          setState({ scaleType: sug.scale, scaleKeyCenter: newKey });
          const ksSel = document.getElementById('scaleKeySelect');
          const stSel = document.getElementById('scaleTypeSelect');
          if (ksSel) ksSel.value = newKey;
          if (stSel) stSel.value = sug.scale;
          renderFretboard();
          renderSuggestions();
          // Mobile: switch to 프렛 tab
          if (window.innerWidth < 900) {
            applyActiveTab('fretboard');
            setState({ activeTab: 'fretboard' });
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === 'fretboard'));
          }
        });
        return btn;
      }

      if (contextual.length > 0) {
        const h = document.createElement('div');
        h.className = 'suggest-section-header';
        h.textContent = '📍 컨텍스트 추천';
        listEl.appendChild(h);
        const row = document.createElement('div');
        row.className = 'suggest-pill-row';
        contextual.forEach(s => row.appendChild(makePill(s, 'contextual')));
        listEl.appendChild(row);
      }
      if (dedupedGeneric.length > 0) {
        const h = document.createElement('div');
        h.className = 'suggest-section-header';
        h.textContent = '🎼 일반 추천';
        listEl.appendChild(h);
        const row = document.createElement('div');
        row.className = 'suggest-pill-row';
        dedupedGeneric.forEach(s => row.appendChild(makePill(s, 'generic')));
        listEl.appendChild(row);
      }
      if (contextual.length === 0 && dedupedGeneric.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = '이 코드에 대한 추천 데이터가 없습니다.';
        listEl.appendChild(empty);
      }
    }

    function renderDrumGrid() {
      ensureDrumPatternShape();
